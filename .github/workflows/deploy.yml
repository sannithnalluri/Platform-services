name: CI/CD Pipeline - Food App Microservices

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, Package & Dockerize
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package with Maven
        run: |
          mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build and push Config Server
      - name: Build & Push Config Server Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./config-server
          file: ./config-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-config-server:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-config-server:${{ github.sha }}

      # Build and push Eureka Server
      - name: Build & Push Eureka Server Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          file: ./eureka-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-eureka-server:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-eureka-server:${{ github.sha }}

      # Build and push API Gateway
      - name: Build & Push API Gateway Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-api-gateway:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-api-gateway:${{ github.sha }}

      # Build and push Food Service
      - name: Build & Push Food Service Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./food-service
          file: ./food-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-food-service:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/foodapp-food-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,prometheus.yml,grafana/"
          target: "/home/${{ secrets.EC2_USERNAME }}/food-app-deployment/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the deployment folder
            cd /home/${{ secrets.EC2_USERNAME }}/food-app-deployment/

            # Log in to Docker Hub to pull private images if any
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Export the Docker Hub Username so docker-compose can resolve the image names
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            
            # Pull new images
            docker compose pull

            # Re-run containers
            docker compose up -d

            # Clean up old container images
            docker image prune -f
