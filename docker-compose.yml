version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: food_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - zipkin

  config-server:
    image: ${DOCKER_HUB_USERNAME:-foodapp}/foodapp-config-server:latest
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      - zipkin

  eureka-server:
    image: ${DOCKER_HUB_USERNAME:-foodapp}/foodapp-eureka-server:latest
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      - zipkin

  api-gateway:
    image: ${DOCKER_HUB_USERNAME:-foodapp}/foodapp-api-gateway:latest
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      - config-server
      - eureka-server

  food-service:
    image: ${DOCKER_HUB_USERNAME:-foodapp}/foodapp-food-service:latest
    build:
      context: ./food-service
      dockerfile: Dockerfile
    container_name: food-service
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      ZIPKIN_URL: http://zipkin:9411
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: food_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      - config-server
      - eureka-server
      - postgres
